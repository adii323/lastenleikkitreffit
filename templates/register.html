{% extends "layout.html" %}

{% block title %}Rekisteröinti{% endblock %}

{% block content %}
<h2>Luo tunnus</h2>
{% if error_password%}
  <div class="error">{{ error_password }}</div>
{% endif %}
{% if error_username%}
  <div class="error">{{ error_username }}</div>
{% endif %}
<form action="/create_user" method="post">
  <p>
    <label for="username">Tunnus:</label> <br />
    <input type="text" name="username" id="username" value="{{ username|default('') }}" required/>
  </p>
  <p>
    <label for="password1">Salasana:</label> <br />
    <input type="password" name="password1" id="password1" required/>
  </p>
  <p>
    <label for="password2">Salasana uudestaan:</label> <br />
    <input type="password" name="password2" id="password2" required/>
  </p>
  <input type="submit" value="Luo tunnus" />
</form>
{% endblock %}
