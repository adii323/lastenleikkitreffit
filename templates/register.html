<!DOCTYPE html>
<html>

<head>
  <title>Rekisteröinti</title>
</head>

<body>
  {% if error_password%}
    <div class="error">{{ error_password }}</div>
  {% endif %}
  {% if error_username%}
    <div class="error">{{ error_username }}</div>
  {% endif %}
  <form action="/create_user" method="post">
    <p>
      Tunnus: <br />
      <input type="text" name="username" value="{{ username|default('') }}" required/>
    </p>
    <p>
      Salasana: <br />
      <input type="password" name="password1" required/>
    </p>
    <p>
      Salasana uudestaan: <br />
      <input type="password" name="password2" required/>
    </p>
    <input type="submit" value="Luo tunnus" />
  </form>
  <p>
    Onko sinulla jo tunnus? <br />
    <a href="/login">Kirjaudu sisään</a>
  </p>
</body>

</html>
