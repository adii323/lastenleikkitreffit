{% extends "layout.html" %}

{% block title %}Kutsun poisto{% endblock %}

{% block content %}
<h2>Kutsun poisto</h2>
<h3>Kutsu: {{ invitation.title }} </h3>
<p>Haluatko varmasti poistaa tämän kutsun?</p>
<form action="/remove_invitation/{{ invitation.id }}" method="post">
  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
  <input type="submit" name="remove" value="Poista ilmoitus">
  <input type="submit" name="back" value="Palaa takaisin">
</form>
{% endblock %}
