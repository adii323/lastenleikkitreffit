<!DOCTYPE html>
<html>

<head>
  <title>Etsi ilmoituksia</title>
</head>

<body>
  <h1>Etsi ilmoituksia</h1>

  <form action="/find_invitations" method="get">
    <p>
      Hakusana: <input type="text" name="query" value="{{ query }}">
    </p>
    <input type="submit" value="Etsi">
  </form>

    <p>
      <a href="/">Takaisin</a>
    </p>

  {% if query %}
  <h2>Tulokset</h2>

  <ul>
    {% for invitation in results %}
    <li><a href="/invitation/{{ invitation.id }}">{{ invitation.title }}</a></li>
    {% endfor %}
  </ul>
  {% endif %}

</body>

</html>
