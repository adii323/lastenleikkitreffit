<!DOCTYPE html>
<html>

<head>
  <title>{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="/static/main.css">
</head>

<body>
  <h1>Lasten leikkitreffit</h1>

  {% if session.username %}
  <p>
    Olet kirjautunut nimellä {{ session.username }}
  </p>
  <p>
    <a href="/">Etusivu</a> |
    <a href="/new_invitation">Uusi kutsu</a> |
    <a href="/find_invitations">Etsi kutsuja</a> |
    <a href="/user/{{ session.user_id }}">Katso käyttäjäsivusi</a> |
    <a href="/logout">Kirjaudu ulos</a> 
  </p>
  {% else %}
  <p>
    <a href="/">Etusivu</a> |
    <a href="/login">Kirjaudu sisään</a> |
    <a href="/register">Luo tunnus</a> |
    <a href="/find_invitations">Etsi kutsuja</a>
  {% endif %}
  </p>

  {% block content %}{% endblock %}

</body>

</html>
